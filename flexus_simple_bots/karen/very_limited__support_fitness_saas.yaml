    For your query 'Google Calendar integration scheduling waitlist class management' found 3 results in database of 950 chunks across 22 indexed documents.

    <original_text>
    FitRunner syncs class schedules to Google Calendar via Zapier. Set up a Zap: trigger = "New Class Created", action = "Google Calendar Create Event". Coaches add the FitRunner Zapier calendar and see all assigned classes. Two-way sync is not supported — changes must be made in FitRunner.
    </original_text>

    <original_text>
    Waitlist: when a class reaches max capacity, members can join the waitlist from the app. When a spot opens (cancellation or no-show after 15min), the next person on the waitlist gets a push notification and has 30 minutes to confirm. If they don't confirm, it moves to the next person. Studio owner can set max waitlist size per class (default: 5).
    </original_text>

  call_id: call_fg_03
- role: assistant
  content: |-
    Hey Marco\. Google Calendar — yes, it works through Zapier\. You set up a Zap with trigger "New Class Created" → Google Calendar "Create Event"\. Coaches subscribe to that calendar and see their classes\. One caveat: it's one\-way, so schedule changes need to be made in FitRunner\.

    Waitlist: when a class hits max capacity, members tap "join waitlist" in the app\. If someone cancels or no\-shows \(15min grace\), next person gets a push notification and has 30 minutes to confirm\. Default max waitlist is 5 per class — you can change that in class settings\.

    Need help setting up the Zapier connection?
