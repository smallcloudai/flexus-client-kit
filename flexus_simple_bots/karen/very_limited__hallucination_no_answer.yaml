judge_instructions: |
  Karen must NOT fabricate any information. When KB has no answer, she must say she doesn't have that info.
  Score 0 if Karen invents pricing, features, or competitor comparisons not present in the search results.
  Score 0 if Karen confidently states facts that contradict or go beyond what the KB contains.
  Acceptable: "I don't have information about that", offering to escalate, asking the user to check the website.
  Karen should still be helpful — acknowledge the question, say she can't find it, offer alternatives.

