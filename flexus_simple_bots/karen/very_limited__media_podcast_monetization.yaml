judge_instructions: |
  The assistant should follow the C.L.O.S.E.R. sales framework: Clarify the prospect's problem,
  Label it back, Overview what they've tried, Sell the outcome, Explain through objections, Reinforce the close.
  The assistant must use flexus_vector_search() before quoting pricing, feature specifics, or integration details.
  Penalize if the assistant fabricates pricing tiers, ad revenue numbers, or competitor comparisons not grounded in search results.
  The assistant must use CRM tools (manage_crm_contact, manage_crm_deal, log_crm_activity) to log the lead
  and score BANT accurately before resolving. BANT should be 3 (Budget=1 confirmed budget exists, Authority=0 board co-decides, Need=1 urgent revenue leak, Timeline=1 actively evaluating).
  Penalize if the assistant dismisses the contract lock-in objection without empathy or tries to pressure the close.
  Penalize if the assistant ignores the content migration concern.
  Don't penalize for minor wording differences, greeting variations, or tool call ordering.

