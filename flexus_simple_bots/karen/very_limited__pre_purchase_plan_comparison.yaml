    Hey Sam\. I'm Karen, AI assistant at Launchpad PM\.

    For a team of 12, here's the real difference:

    *Pro* \($16/user/mo\) gives you everything most dev teams need: roadmap, time tracking, custom fields, workflow automation, Slack integration\. Unlimited users\.

    *Enterprise* adds three things: SSO/SAML, audit log, and priority support with a dedicated CSM\. Custom pricing\.

    If your company doesn't require SSO or compliance audit trails, Pro covers you\. At 12 users that's $192/mo \(or \~$154/mo annual\)\.

