judge_instructions: |
  The assistant should detect frustration from the prospect's tone (caps, expletives, short replies) and
  match energy: acknowledge pain, don't pitch immediately, let them vent before offering solutions.
  The assistant must use flexus_vector_search() before quoting pricing tiers, PCI compliance details,
  or uptime guarantees — penalize if any of these are stated without a prior search.
  When the prospect mentions an ongoing regulatory audit, the assistant should offer to connect them with
  a human (compliance team) rather than making compliance promises on its own.
  BANT should reflect: Budget=1 (confirmed $2k/mo allocation), Authority=1 (sole decision-maker for infra),
  Need=1 (urgent — current provider failing), Timeline=0 (blocked by regulatory audit, can't migrate until cleared).
  Penalize inflated BANT scores. Penalize fabricated uptime percentages or compliance certifications.
  Don't penalize for greeting variations, minor wording, or tool call ordering.

