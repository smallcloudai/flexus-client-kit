- role: cd_instruction
  content: |-
    📄/company/summary
    {
      "stage": "Growth",
      "mission": "Turn every production line into a self-improving system",
      "tagline": "Real-time quality intelligence for discrete manufacturing",
      "website": "https://forgeline.io",
      "industry": "Manufacturing Technology / Quality Management SaaS",
      "company_name": "ForgeLine"
    }

    📄/company/sales-strategy
    {
      "approach": "consultative",
      "icp": "Mid-size discrete manufacturers (50-500 employees) running 1-3 production lines who rely on paper-based quality checks, spreadsheets, or disconnected legacy QMS for defect tracking and traceability",
      "objection_playbook": {
        "price": "Average customer reduces scrap rate by 30-40% within 90 days. At typical scrap costs of $15-25 per unit, the platform pays for itself within the first quarter. We price per production line, not per user, so your whole team gets access.",
        "complexity": "We deploy alongside your existing line — no equipment changes, no downtime. Operators use a tablet interface designed for gloved hands. Average rollout is 2 weeks including training.",
        "trust": "60-day pilot on one production line — real data, no contract. We handle SOC 2 and ITAR compliance. Your data stays on-prem if needed.",
        "erp_integration": "We integrate with SAP, Oracle, Epicor, and IQMS out of the box via certified connectors. For other ERPs we have a REST API and flat-file import. Integration typically takes 3-5 days with our team.",
        "operator_adoption": "The tablet UI was designed with input from floor operators at 12 manufacturing plants. Big buttons, visual workflows, barcode/QR scan — no typing. Average adoption time is 3 shifts."
      },
      "trial": {
        "duration_days": 60,
        "credit_card_required": false,
        "includes": "Full platform on one production line, unlimited users, SPC dashboards, API access, onboarding and operator training"
      }
    }

    📄/support/summary
    {
      "support-policy": {
        "meta": {
          "created_at": "2026-03-15T10:00:00.000000+00:00"
        },
        "section01-product": {
          "title": "Product",
          "question01-description": {
            "a": "ForgeLine is a real-time quality management platform for discrete manufacturing. It captures inspection data at every station via tablets or IoT sensors, runs SPC analysis in real time, traces defects to root cause (machine, shift, material lot), and generates audit-ready reports for ISO 9001, IATF 16949, and AS9100.",
            "q": "What is the product?"
          },
          "question02-features": {
            "a": "In-line digital inspection (tablet + barcode/QR), real-time SPC charts (Xbar-R, Cpk, Ppk), automated defect traceability (machine, operator, shift, material lot), root cause analysis with Pareto/Ishikawa, non-conformance (NCR) workflow with CAPA tracking, ERP integrations (SAP, Oracle, Epicor, IQMS), IoT sensor ingestion (temperature, torque, vibration), audit-ready report generation (ISO 9001, IATF 16949, AS9100), customer portal for supplier quality scorecards, SOC 2 Type II and ITAR compliant.",
            "q": "What are the key features?"
          },
          "question03-ideal-customer-profile": {
            "a": "Mid-size discrete manufacturers (50-500 employees) with 1-3 production lines who need digital quality management but lack the IT resources to build or maintain a custom MES/QMS. Also: Tier 2/3 automotive and aerospace suppliers facing customer-mandated digital traceability requirements.",
            "q": "Who is the ideal customer (ICP)?"
          }
        },
        "section02-future-ops": {
          "title": "Pricing & Billing",
          "question01-shipping": {
            "a": "",
            "q": "Shipping methods, costs, times?"
          },
          "question04-payments": {
            "a": "Per-production-line pricing. Starter: $1,200/mo per line (1 line, up to 50 users). Growth: $950/mo per line (2-5 lines, volume discount). Enterprise: custom (6+ lines, on-prem option, dedicated CSM). Annual contracts get 20% discount. Net-30 invoicing available.",
            "q": "Payment options & pricing?"
          },
          "question02-returns": {
            "a": "60-day pilot is free on one line. Monthly contracts can be cancelled anytime with 30-day notice. Annual contracts: pro-rated refund within first 90 days.",
            "q": "Refund policy?"
          }
        },
        "section03-support": {
          "title": "Support",
          "question01-channels": {
            "a": "Telegram @forgeline_support, email support@forgeline.io, in-app chat, phone support for Enterprise tier",
            "q": "Support channels (email, chat, etc.)?"
          },
          "question02-escalation": {
            "a": "Enterprise pricing requests, custom ERP integrations, ITAR/compliance questions, on-premises deployment requests, data migration from legacy QMS",
            "q": "When to escalate to human?"
          }
        },
        "section04-restrictions": {
          "title": "Restrictions",
          "question01-never-say": {
            "a": "Never guarantee specific scrap rate reduction percentages as outcomes — only quote published averages. Never promise ISO certification as a result of using ForgeLine. Never share other customers' quality data or defect rates. Never promise custom sensor integrations without engineering review.",
            "q": "What should support NEVER say?"
          }
        }
      }
    }
