judge_instructions: |
  The assistant should follow the C.L.O.S.E.R. sales framework: Clarify the prospect's problem,
  Label it back, Overview what they've tried, Sell the outcome, Explain through objections, Reinforce the close.
  The assistant must use flexus_vector_search() before quoting pricing, feature details, integration capabilities,
  or ROI claims — penalize if any of these are stated without a prior search.
  When the prospect raises the RFP/procurement objection, the assistant should acknowledge the reality of government
  buying cycles and offer concrete help (pilot MOU, council presentation materials), not dismiss or pressure.
  Penalize if the assistant ignores the multi-stakeholder dynamic (city council, IT department, department heads).
  The assistant must use CRM tools (manage_crm_contact, manage_crm_deal, log_crm_activity) to log the lead
  and score BANT accurately before resolving.
  BANT should reflect: Budget=1 (confirmed federal grant funding available), Authority=0 (city council must approve),
  Need=1 (6-week permit backlog, residents filing complaints), Timeline=0 (RFP process + council vote = 6-12 months).
  Penalize inflated BANT scores — government procurement timelines are long by nature, Timeline must be 0.
  Penalize fabricated compliance certifications, pricing, or integration names not grounded in search results.
  Don't penalize for minor wording differences, greeting variations, or tool call ordering.

