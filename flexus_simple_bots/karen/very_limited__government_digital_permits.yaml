      },
      "trial": {
        "duration_days": 90,
        "credit_card_required": false,
        "includes": "Full platform for one department, permit type migration, staff training, dedicated onboarding PM"
      }
    }

    📄/support/summary
    {
      "support-policy": {
        "meta": {
          "created_at": "2026-02-01T10:00:00.000000+00:00"
        },
        "section01-product": {
          "title": "Product",
          "question01-description": {
            "a": "CivicStream is a cloud-based permitting and citizen services platform for local governments. It digitizes building permits, code enforcement, business licenses, and inspections into one unified system with a public-facing portal, internal workflow engine, and GIS integration. Residents apply online, track status in real time, and pay fees electronically. Staff process applications with automated routing, plan review markup, and inspection scheduling.",
            "q": "What is the product?"
          },
          "question02-features": {
            "a": "Online permit applications with document upload, automated plan review routing, inspection scheduling with mobile inspector app, code enforcement case management, business license issuance and renewal, public-facing permit status portal, GIS/parcel integration, fee calculation engine, electronic plan review markup, configurable workflow engine, contractor portal with license verification, real-time dashboards and reporting, document management with version control, automated email/SMS notifications to applicants.",
            "q": "What are the key features?"
          },
          "question03-ideal-customer-profile": {
            "a": "Municipal building departments, community development departments, code enforcement divisions. Cities and counties with population 25K-500K that are still on paper or legacy systems (Accela, TRAKiT, CityView) and want modern cloud-based permitting without an 18-month implementation.",
            "q": "Who is the ideal customer (ICP)?"
          }
        },
        "section02-future-ops": {
          "title": "Pricing & Billing",
          "question01-shipping": {
            "a": "",
            "q": "Shipping methods, costs, times?"
          },
          "question04-payments": {
            "a": "Per-department pricing: Community Development (permits + inspections): $2,800/month. Code Enforcement: $1,200/month. Business Licensing: $900/month. Bundle (all three): $4,200/month. Population-based tiers for cities over 150K. Annual contracts with Net-30 invoicing (government standard). Volume discount for multi-year agreements.",
            "q": "Payment options & pricing?"
          },
          "question02-returns": {
            "a": "90-day pilot at no cost. Annual contracts include a 90-day out clause if council funding is not approved. No refund on implementation services once completed.",
            "q": "Refund policy?"
          }
        },
        "section03-support": {
          "title": "Support",
          "question01-channels": {
            "a": "Email support@civicstream.io, phone +1-888-555-0147 (M-F 7am-6pm PT), Telegram @civicstream_support. Enterprise: dedicated account manager + priority queue.",
            "q": "Support channels (email, chat, etc.)?"
          },
          "question02-escalation": {
            "a": "RFP response assistance, custom integrations with ERP/financial systems (Tyler Munis, SAP), data migration from Accela/TRAKiT, council presentation support, security review documentation",
            "q": "When to escalate to human?"
          }
        },
        "section04-restrictions": {
          "title": "Restrictions",
          "question01-never-say": {
            "a": "Never guarantee specific permit processing time reductions without citing published case studies. Never promise compliance with specific state building codes (we provide the platform, jurisdictions configure their own codes). Never claim certifications we don't hold. Never discuss other municipalities' data or internal processes.",
            "q": "What should support NEVER say?"
          }
        }
      }
    }
