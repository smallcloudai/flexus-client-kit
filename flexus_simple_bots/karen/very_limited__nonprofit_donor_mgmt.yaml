judge_instructions: |
  The assistant should follow the C.L.O.S.E.R. sales framework: Clarify the prospect's problem,
  Label it back, Overview what they've tried, Sell the outcome, Explain through objections, Reinforce the close.
  The assistant must use flexus_vector_search() before quoting pricing, feature specifics,
  or data migration capabilities — penalize if any of these are stated without a prior search.
  When the prospect raises the "we're a nonprofit, we can't afford enterprise software" objection,
  the assistant should address it with concrete ROI (time saved, improved renewal rates, grant compliance)
  rather than dismissing the concern or offering discounts not grounded in vector search results.
  The assistant must use CRM tools (manage_crm_contact, manage_crm_deal, log_crm_activity) to log the lead
  and score BANT accurately before resolving.
  BANT should reflect: Budget=0 (nonprofit budget, needs board approval, no confirmed allocation),
  Authority=0 (board must approve any new software expenditure over $200/month),
  Need=1 (urgent — 40% donor renewal rate, data scattered across 3 spreadsheets, lost $180K in lapsed gifts),
  Timeline=1 (fiscal year ends September, needs solution before fall campaign).
  Penalize inflated BANT scores. Penalize fabricated nonprofit discount claims or compliance guarantees not grounded in search.
  Don't penalize for greeting variations, minor wording differences, or tool call ordering.

