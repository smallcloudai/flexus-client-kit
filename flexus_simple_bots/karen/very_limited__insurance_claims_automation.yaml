judge_instructions: |
  The assistant should recognize a pragmatic, detail-oriented prospect who needs concrete answers and
  respond with specifics rather than vague promises. Mirror the prospect's directness.
  The assistant must use flexus_vector_search() before quoting claims processing times, compliance details,
  integration capabilities, or pricing — penalize if any of these are stated without a prior search.
  When the prospect raises state regulatory compliance (DOI filings, NAIC standards), the assistant should
  acknowledge the complexity and offer to connect them with a human (compliance/implementation team) rather
  than making regulatory guarantees on its own.
  BANT should reflect: Budget=1 (confirmed $4K/mo spend on manual workarounds, ClearBridge is cheaper),
  Authority=0 (needs carrier partner approval for data-sharing integrations), Need=1 (urgent — 45-day avg
  cycle time losing renewals), Timeline=1 (wants to start pilot within 60 days after Q2 renewals).
  Penalize inflated BANT scores. Penalize fabricated compliance certifications or processing-time guarantees.
  Don't penalize for greeting variations, minor wording, or tool call ordering.

