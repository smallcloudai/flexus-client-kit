- role: cd_instruction
  content: |-
    📄/company/summary
    {
      "stage": "Growth",
      "mission": "Eliminate claims processing friction for independent agencies",
      "tagline": "Close claims faster, keep policyholders happy",
      "website": "https://clearbridge.io",
      "industry": "Insurtech / Claims Processing Automation",
      "company_name": "ClearBridge"
    }

    📄/company/sales-strategy
    {
      "approach": "consultative",
      "icp": "Independent P&C insurance agencies with 10-50 staff handling 500-5,000 claims/year who lose renewals to slow claims cycles and manual carrier portal re-keying",
      "objection_playbook": {
        "price": "Most agencies spend $3-5K/month on overtime, temp staff, and error rework from manual processing. ClearBridge replaces all of that. Net cost is typically 40% less than the status quo.",
        "complexity": "We pre-build integrations with 30+ carrier portals. Onboarding takes 2-3 weeks, not months. Your adjusters keep using the same workflows — we automate the back-office plumbing.",
        "trust": "We process 200K+ claims/year across 150 agencies. SOC 2 Type II certified, compliant with NAIC data security model law. References available from agencies your size.",
        "competitor": "We respect other platforms. Our differentiator is carrier portal automation — most competitors require manual uploads. We pull and push data directly via carrier APIs and ACORD standards."
      },
      "trial": {
        "duration_days": 30,
        "credit_card_required": false,
        "includes": "30-day pilot with up to 3 carrier integrations, full claims dashboard, and dedicated onboarding specialist. No commitment — cancel anytime during pilot."
      }
    }

    📄/support/summary
    {
      "support-policy": {
        "meta": {
          "created_at": "2026-03-15T08:00:00.000000+00:00"
        },
        "section01-product": {
          "title": "Product",
          "question01-description": {
            "a": "ClearBridge is a claims processing automation platform for independent P&C insurance agencies. We connect directly to carrier portals via APIs and ACORD messaging, automate first notice of loss (FNOL) intake, route claims to the right adjuster, track status across carriers, and generate compliance-ready reporting. Adjusters work from a single dashboard instead of logging into 4-8 separate carrier portals.",
            "q": "What is the product?"
          },
          "question02-features": {
            "a": "Carrier portal automation (30+ carriers), ACORD-compliant data exchange, AI-powered FNOL intake (photo/document OCR), smart claims routing by line of business and adjuster workload, real-time status sync across all carriers, automated policyholder status notifications (email/SMS), compliance dashboard with DOI-ready reporting, claims cycle analytics, document management with version control, API for AMS integration (Applied Epic, Vertafore, HawkSoft).",
            "q": "What are the key features?"
          },
          "question03-ideal-customer-profile": {
            "a": "Independent P&C agencies with 10-50 staff, handling 500-5,000 claims/year, working with 4+ carriers, frustrated by manual re-keying and slow claims cycles. Also: agency clusters and aggregators looking to standardize claims workflows across member agencies.",
            "q": "Who is the ideal customer (ICP)?"
          }
        },
        "section02-future-ops": {
          "title": "Pricing & Billing",
          "question01-shipping": {
            "a": "",
            "q": "Shipping methods, costs, times?"
          },
          "question04-payments": {
            "a": "Per-claim pricing with monthly platform fee. Starter: $2.50/claim + $500/month (up to 200 claims/month). Professional: $1.80/claim + $800/month (up to 500 claims/month, includes analytics dashboard). Enterprise: custom pricing for 500+ claims/month or multi-location agencies. All plans include carrier portal integrations, FNOL automation, and email/chat support.",
            "q": "Payment options & pricing?"
          },
          "question02-returns": {
            "a": "30-day pilot with full refund if not satisfied. Monthly contracts, cancel with 30 days notice. No long-term lock-in.",
            "q": "Refund policy?"
          }
        },
        "section03-support": {
          "title": "Support",
          "question01-channels": {
            "a": "Telegram @clearbridge_support, email support@clearbridge.io, phone (Professional/Enterprise): +1-888-555-0239",
            "q": "Support channels (email, chat, etc.)?"
          },
          "question02-escalation": {
            "a": "State regulatory/DOI compliance questions, carrier integration failures, data breach or security concerns, multi-agency rollout planning, custom carrier API requests, HIPAA-adjacent health insurance claims",
            "q": "When to escalate to human?"
          }
        },
        "section04-restrictions": {
          "title": "Restrictions",
          "question01-never-say": {
            "a": "Never guarantee specific claims cycle times (varies by carrier and claim complexity). Never provide legal or regulatory advice. Never share other agencies' claims data or carrier relationships. Never make compliance certifications that aren't documented — always search first. Never promise carrier integrations that aren't built yet without confirming with engineering.",
            "q": "What should support NEVER say?"
          }
        }
      }
    }
