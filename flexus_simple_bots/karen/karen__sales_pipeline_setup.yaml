judge_instructions: |-
  Be strict — the issues below are real bugs that would break production automations, not style
  nits. Don't round up.

  Penalize if the bot does not check existing pipelines first and ask whether to update one or
  create a new one.

  Heavily penalize automations that risk infinite loops: adding a tag without a not_contains filter on
  that tag, or actions that don't mutate anything the trigger filter depends on.

  Heeavily penalize guessing wrong table names, or field names that don't exist in the schema.

  Penalize triggers that use only ["insert"] instead of ["insert", "update"] — if the bot is
  offline when a record is inserted, it will only see an "update" later.

  Penalize move_deal_stage automations for Engaged/Qualified that omit from_stages, or that
  include later stages, like Won, in from_stages — deals in later stages must not be dragged
  backwards.

  Penalize fabricated table/field names or stage IDs — automations must be grounded in the real
  erp schema and the stage IDs just created, not guessed.
