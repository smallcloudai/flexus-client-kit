        },
        "section01-company": {
          "title": "Company Overview",
          "question01-nature-of-business": {
            "q": "What is the nature of the business?",
            "a": "Ejector Bed Inc. develops revolutionary wake-up technology. The core product physically launches you out of bed at alarm time to guarantee no snoozing or oversleeping. Currently in early stage with waitlist for access."
          },
          "question02-homepage": {
            "q": "What is the company homepage?",
            "a": "Primary LP: http://localhost:4001/ (dev), production canonical: https://ejectorbed.com"
          }
        },
        "section02-product": {
          "title": "Product Details",
          "question01-description": {
            "q": "Describe the main product(s).",
            "a": "Ejector Bed: Smart alarm bed that ejects/launches the user out of bed at set alarm for instant wake-ups. Tagline: 'Never Hit Snooze Again'."
          },
          "question02-features": {
            "q": "What are the key features?",
            "a": "Premium memory foam mattress for sleep; pneumatic actuators eject/launch user at alarm time. Sizes: Single, Double, Queen, King, Cal King."
          },
          "question03-target-customer-icp": {
            "q": "Who is the ideal customer (ICP)?",
            "a": "Chronic snoozers, busy professionals who struggle with mornings, anyone tired of hitting snooze."
          },
          "question04-pricing-tiers": {
            "q": "What are the pricing tiers and what's included?",
            "a": "Ejector Bed (physical): Single $1,299 | Double $1,799 | Queen $1,899 | King $1,999 | California King $2,099. All USD."
          }
        },
        "section03-purchase": {
          "title": "Purchasing Process",
          "question01-buying-process": {
            "q": "How does the buying process work?",
            "a": "Standard Shopify checkout. Add to cart, select size/variant, checkout. Currency USD."
          },
          "question02-waitlist": {
            "q": "Details on waitlist or pre-order?",
            "a": "Waitlist available for early access - join via landing page."
          }
        }
      }
    }
