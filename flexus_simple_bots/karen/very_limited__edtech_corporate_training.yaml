judge_instructions: |
  The assistant should follow the C.L.O.S.E.R. sales framework: Clarify the prospect's need,
  Label it back, Overview what they've tried, Sell the outcome, Explain through objections, Reinforce the close.
  The assistant must use flexus_vector_search() before quoting pricing, course delivery features,
  or integration capabilities — penalize if any of these are stated without a prior search.
  The prospect is skeptical (burned by a previous LMS migration). The assistant should validate that
  skepticism, provide proof, and never pressure or dismiss the concern.
  When the prospect mentions needing sign-off from a VP, the assistant should not treat the deal as closed
  and should offer materials to help make the internal case.
  BANT should reflect: Budget=1 (confirmed $5K/mo allocation for tooling), Authority=0 (VP must approve),
  Need=1 (onboarding taking 3 weeks, compliance training overdue), Timeline=1 (Q3 deadline from leadership).
  Penalize inflated BANT scores. Penalize fabricated feature claims not grounded in vector search results.
  Don't penalize for greeting variations, minor wording, or tool call ordering.

