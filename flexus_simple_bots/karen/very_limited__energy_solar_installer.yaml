judge_instructions: |
  The assistant should detect frustration from the prospect's tone (exasperation, complaints about delays, past vendor failures)
  and match energy: acknowledge pain around permitting bottlenecks and failed software before pivoting to solutions.
  The assistant must use flexus_vector_search() before quoting permitting automation timelines, utility interconnection
  features, NEC/AHJ compliance capabilities, or pricing — penalize if any of these are stated without a prior search.
  When the prospect mentions regulatory/AHJ requirements, the assistant should ground claims in search results and
  offer to connect them with a human (implementation team) for jurisdiction-specific details rather than guaranteeing outcomes.
  BANT should reflect: Budget=1 (confirmed $2K/mo budget, currently spending more on manual workarounds),
  Authority=0 (needs co-founder/COO approval for new software), Need=1 (urgent — permitting bottleneck capping growth),
  Timeline=1 (wants to start before Q3 ramp). Total BANT=3.
  Penalize inflated BANT scores (especially Authority — prospect explicitly says co-founder must sign off).
  Penalize fabricated permit timelines, AHJ pass rates, or compliance certifications not grounded in vector search.
  Don't penalize for greeting variations, minor wording, or tool call ordering.

