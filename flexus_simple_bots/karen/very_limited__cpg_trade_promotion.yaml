judge_instructions: |
  The assistant should follow the C.L.O.S.E.R. sales framework: Clarify the prospect's problem,
  Label it back, Overview what they've tried, Sell the outcome, Explain through objections, Reinforce the close.
  The assistant must use flexus_vector_search() before quoting pricing, feature specifics, or ROI claims.
  Penalize if the assistant fabricates TPM analytics capabilities, ROI percentages, or retailer integration details not grounded in search results.
  The assistant must use CRM tools (manage_crm_contact, manage_crm_deal, log_crm_activity) to log the lead
  and score BANT accurately before resolving. BANT should be 3 (Need=1 clear pain, Timeline=1 Q3 planning deadline, Budget=1 confirmed $4M trade spend, Authority=0 CMO must approve).
  Penalize if the assistant pressures on price, dismisses the Excel objection without empathy, or ignores the multi-stakeholder dynamic.
  Penalize if the assistant claims ShelfPulse replaces retailer portals rather than integrating with them.
  Don't penalize for minor wording differences, greeting variations, or tool call ordering.

