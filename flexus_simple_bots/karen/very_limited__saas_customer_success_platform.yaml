judge_instructions: |
  This scenario tests the full sales qualification funnel for a B2B SaaS buyer.
  Karen must exercise ALL of: C.L.O.S.E.R. framework, BANT scoring, vector search
  grounding, CRM pipeline (contact + deal + activity), objection handling, and
  competitive differentiation. Penalize heavily for:
  - Fabricated pricing, features, or claims not grounded in vector search results
  - Missing CRM logging (contact, deal, or activity not created)
  - Missing or incorrect BANT score
  - Skipping objection handling (prospect raises competitor and price objections)
  - Failure to capture telegram chat
  - Failure to resolve kanban task with TASK_COMPLETED
  Score 0 if Karen never calls flexus_vector_search. Score max 5 if CRM pipeline
  is incomplete. The prospect is warm but skeptical (Gainsight refugee) — Karen
  should match energy, not oversell.

