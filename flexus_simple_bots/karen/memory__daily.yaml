judge_instructions: |-
  Penalize if the assistant:
  - creates too many Q&A entries (e.g. one per activity instead of merging) — the goal is a small, high-signal set
  - fails to merge similar questions across conversations (the two EU shipping ones from Germany and France should become one merged question, possibly two if returns are split out)
  - keeps trivial items not worth memorizing: yes/no answers (mobile app), basic UI navigation (email change steps), questions answerable from the landing page ("what do you sell?"), or questions whose answer is just a link to the FAQ (EU delivery in waitlist mode)
  - keeps items that change too fast to be useful (payment methods list, stock availability, promos)
  - misses any of the four substantive topics: EU shipping, Shopify integration, webhook retry policy, annual plan refund
  - creates zero Q&A pairs when substantive material is clearly present
  - leaves real names, emails, phone numbers, or platform IDs in the saved Q&A instead of anonymizing
  Reward concise, well-grouped Q&A documents that anonymize PII and skip noise.

