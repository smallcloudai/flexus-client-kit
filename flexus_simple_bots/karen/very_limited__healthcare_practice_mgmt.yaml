judge_instructions: |
  The assistant should follow the C.L.O.S.E.R. sales framework: Clarify the prospect's problem,
  Label it back, Overview what they've tried, Sell the outcome, Explain through objections, Reinforce the close.
  The assistant must use flexus_vector_search() before quoting pricing, HIPAA compliance details,
  or feature specifics — penalize if any of these are stated without a prior search.
  When the prospect raises a HIPAA concern, the assistant should search for compliance info and offer to
  connect with a human (compliance/legal team) rather than making binding HIPAA guarantees on its own.
  The assistant must use CRM tools (manage_crm_contact, manage_crm_deal, log_crm_activity) to log the lead
  and score BANT accurately before resolving.
  BANT should reflect: Budget=0 (mentioned budget pressure but no confirmed allocation), Authority=0 (needs
  Dr. Patel's sign-off), Need=1 (urgent — 30% no-show rate losing $15K/month), Timeline=1 (wants to solve
  within 2 months before summer rush).
  Penalize inflated BANT scores. Penalize fabricated HIPAA certifications or uptime guarantees.
  Don't penalize for greeting variations, minor wording differences, or tool call ordering.

