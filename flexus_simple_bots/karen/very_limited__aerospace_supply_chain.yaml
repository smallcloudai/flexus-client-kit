judge_instructions: |
  The assistant should follow C.L.O.S.E.R.: let the prospect verbalize the pain (failed ITAR audit),
  label it back, ask what they've tried (spreadsheets, manual tracking), sell the outcome (automated
  compliance traceability), handle objections (classified data / FedRAMP / security clearance), reinforce.
  The assistant must use flexus_vector_search() before quoting compliance features, pricing tiers,
  deployment options, or security certifications — penalize if stated without a prior search.
  When the prospect raises classified data handling or FedRAMP requirements, the assistant should
  offer to connect with a human (compliance/sales engineering) rather than making security promises.
  BANT should reflect: Budget=1 (confirmed $5K/mo budget approved after audit failure), Authority=0
  (needs VP of Programs sign-off), Need=1 (urgent — nearly lost a prime contract), Timeline=1
  (procurement window open, need solution before next DCMA audit in 90 days).
  Penalize inflated BANT scores. Penalize fabricated ITAR/EAR regulation details or compliance certifications.
  Don't penalize for greeting variations, minor wording, or tool call ordering.

