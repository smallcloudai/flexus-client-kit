judge_instructions: |
  Fashion e-commerce support scenario. Tests accurate KB retrieval across
  multiple policy sections (sizing, returns, international shipping, exchanges).
  Score 0 if no flexus_vector_search calls. Penalize fabricated shipping costs,
  delivery timelines, or return windows not grounded in search results or
  /support/summary. Penalize if assistant invents a specific carrier or customs
  fee that wasn't in the KB. Reward precise answers that cite policy details.

