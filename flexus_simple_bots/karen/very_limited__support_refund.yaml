  specific situation: $500 prepaid minus $150 consumed = $350 refundable, within the 30-day window.
  Penalize if the assistant just quotes the policy without calculating the specific refundable amount.
  Penalize if the assistant fabricates policy terms not in the search results.
  The assistant should recognize the actual refund processing requires escalation (per very_limited rules:
  "Escalate to a human on: cancellation/refund requests") and hand off appropriately.
  Don't penalize for extra search attempts or minor wording differences.

