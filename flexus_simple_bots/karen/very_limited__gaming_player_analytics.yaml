          "title": "Support",
          "question01-channels": {
            "a": "Telegram @arcanalytics_support, email support@arcanalytics.io, dedicated Slack channel for Growth/Enterprise tiers, in-app chat",
            "q": "Support channels (email, chat, etc.)?"
          },
          "question02-escalation": {
            "a": "Enterprise pricing requests, custom ML model training, data residency questions, COPPA/GDPR compliance for kids' games, migration from competitor platforms",
            "q": "When to escalate to human?"
          }
