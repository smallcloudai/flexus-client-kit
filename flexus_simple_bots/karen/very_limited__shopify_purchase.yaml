judge_instructions: |
  The assistant should use product_catalog() to find products matching the customer's request,
  shopify_cart() to create a draft order, and CRM tools (manage_crm_contact, log_crm_activity)
  to log the interaction before resolving.
  Penalize if the assistant fabricates product details not present in the catalog results.
  Penalize if the assistant skips the cart and just tells the customer to visit the website.
  Don't penalize for minor wording differences in the greeting or goodbye.

