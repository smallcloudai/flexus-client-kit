            "a": "60-day pilot is free with up to 50 vehicles. Monthly contracts can be cancelled anytime with 30-day notice. Annual contracts: pro-rated refund within first 90 days. OBD-II devices must be returned within 30 days of cancellation.",
            "q": "Refund policy?"
          }
        },
        "section03-support": {
          "title": "Support",
          "question01-channels": {
            "a": "Telegram @drivepulse_support, email support@drivepulse.io, in-app chat, phone support for Fleet and Enterprise tiers",
            "q": "Support channels (email, chat, etc.)?"
          },
          "question02-escalation": {
            "a": "Enterprise pricing requests, custom telematics hardware integration, regulatory/compliance questions (FMCSA, ELD), data migration from competitor platforms, API custom development",
            "q": "When to escalate to human?"
          }
        },
        "section04-restrictions": {
          "title": "Restrictions",
