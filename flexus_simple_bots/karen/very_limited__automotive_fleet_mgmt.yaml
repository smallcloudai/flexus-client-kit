            "a": "Never guarantee specific downtime reduction percentages unless quoting published case studies. Never share other customers' fleet data. Never promise custom hardware integration without engineering review. Never disparage competitors by name. Never guarantee ELD compliance without reviewing the customer's specific regulatory requirements.",
