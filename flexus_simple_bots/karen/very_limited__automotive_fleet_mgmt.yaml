          },
          "question03-ideal-customer-profile": {
            "a": "Fleet operators with 50-1,000 vehicles who deal with unplanned breakdowns, high maintenance costs, or poor visibility into vehicle health. Common verticals: last-mile delivery, field service, construction, car rental, municipal fleets.",
