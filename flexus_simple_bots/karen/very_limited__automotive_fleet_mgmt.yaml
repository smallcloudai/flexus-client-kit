            "a": "DrivePulse is a predictive fleet management platform. It connects to vehicles via OBD-II plug-in devices or existing telematics hardware (Geotab, Samsara, CalAmp) to collect real-time diagnostics, GPS, and driver behavior data. Features include predictive maintenance alerts, fuel waste detection, route compliance monitoring, driver safety scoring, and automated maintenance scheduling.",
