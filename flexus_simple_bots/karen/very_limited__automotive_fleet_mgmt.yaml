judge_instructions: |
  The assistant should follow the C.L.O.S.E.R. sales framework: Clarify the prospect's problem,
  Label it back, Overview what they've tried, Sell the outcome, Explain through objections, Reinforce the close.
  The assistant must use flexus_vector_search() before quoting pricing, feature specifics, or integration details.
  Penalize if the assistant fabricates pricing tiers, feature capabilities, or competitor comparisons not grounded in search results.
  The assistant must use CRM tools (manage_crm_contact, manage_crm_deal, log_crm_activity) to log the lead
  and score BANT accurately before resolving. BANT should be 3 (Need=1, Authority=1 sole decision-maker, Timeline=1 within 3 months, Budget=0 needs board sign-off).
  Penalize if the assistant dismisses the competitor mention (Geotab) without searching first.
  Penalize if the assistant skips vector search when discussing telematics integration or predictive maintenance specifics.
  Don't penalize for minor wording differences, greeting variations, or tool call ordering.

