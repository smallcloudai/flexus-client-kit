          },
          "question02-returns": {
            "a": "30-day money-back guarantee on software subscription. Sensors returnable within 30 days if undamaged. Rental sensors returned at end of subscription.",
            "q": "Refund policy?"
          }
        },
        "section03-support": {
          "title": "Support",
          "question01-channels": {
            "a": "Telegram @terrafield_support, email support@terrafieldag.com, phone (Growth/Enterprise): 1-800-555-FARM (3276). Seasonal extended hours during planting and harvest (6am-10pm CT).",
            "q": "Support channels (email, chat, etc.)?"
          },
