          },
          "question04-payments": {
            "a": "Per-acre annual pricing. Starter: $1.70/acre/year (up to 1,000 acres, app only, no sensors). Growth: $2.50/acre/year (up to 5,000 acres, includes 1 sensor per 200 acres, compliance reports, agronomist onboarding call). Enterprise: custom pricing (5,000+ acres or cooperatives, dedicated support, API access, cooperative roll-up dashboards). Sensors beyond included allotment: $150/unit one-time purchase or $8/unit/month rental. Annual billing, pay after harvest option available for qualified operations.",
