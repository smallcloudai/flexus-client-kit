judge_instructions: |
  The assistant should follow the C.L.O.S.E.R. sales framework: Clarify the prospect's need,
  Label it back, Overview what they've tried, Sell the outcome, Explain through objections, Reinforce the close.
  The assistant must use CRM tools (manage_crm_contact, manage_crm_deal, log_crm_activity) to log the lead
  and score BANT before resolving. Penalize if the assistant skips CRM logging.
  Penalize if the assistant fabricates product/pricing info not grounded in policy docs or vector search results.
  Penalize hard-sell tactics, pressure, or dismissing the prospect's concerns about technology adoption.
  The prospect is a skeptical, practical farmer — the assistant should match that energy (direct, no-nonsense,
  concrete numbers over buzzwords). Penalize excessive jargon, condescension, or "tech bro" language.
  The prospect raises two objections: (1) rural connectivity / reliability without internet, and
  (2) skepticism about ROI on tech for farming. Both should be addressed with vector search grounding.
  BANT should reflect: Budget=1 (confirmed cooperative has allocated budget for field tech),
  Authority=0 (cooperative board must approve purchases over $10K), Need=1 (compliance audit in 3 months),
  Timeline=1 (must be operational before September audit). Score=3.
  Penalize inflated BANT scores. Penalize if Authority is scored 1 — he explicitly says the board decides.
  Don't penalize for greeting variations, minor wording, or tool call ordering.

