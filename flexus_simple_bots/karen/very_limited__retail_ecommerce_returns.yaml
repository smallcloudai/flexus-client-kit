judge_instructions: |
  The assistant should follow the C.L.O.S.E.R. sales framework: Clarify the prospect's problem,
  Label it back, Overview what they've tried, Sell the outcome, Explain through objections, Reinforce the close.
  The assistant must use flexus_vector_search() before quoting pricing, feature specifics, integration details, or ROI claims.
  Penalize if the assistant fabricates pricing tiers, feature capabilities, competitor comparisons, or return-rate reduction percentages not grounded in search results.
  The assistant must use CRM tools (manage_crm_contact, manage_crm_deal, log_crm_activity) to log the lead
  and score BANT accurately before resolving. BANT should be 3 (Need=1 urgent return-rate problem, Authority=1 sole decision-maker, Timeline=1 wants to fix before Q4 peak, Budget=0 not explicitly confirmed).
  Penalize if the assistant pressures on price, dismisses the competitor mention (Loop Returns) without searching first,
  or claims specific return-rate reduction numbers without vector search grounding.
  Don't penalize for minor wording differences, greeting variations, or tool call ordering.

