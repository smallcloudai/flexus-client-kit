judge_instructions: |
  Pure support scenario — zero buying intent. E-commerce. Customer asks a product
  compatibility question, then a shipping question, then leaves. Tests support-default
  behavior: never tries to sell, never enters sales-assist mode.
  Score 0 if Karen qualifies (asks about budget/team/timeline/authority) or upsells.
  Score 0 if no flexus_vector_search calls.
  Penalize: asking unnecessary follow-up questions, feature dumps, C.L.O.S.E.R.
  behavior, mentioning pricing tiers or trials unprompted, BANT interrogation.
  Reward: direct answers, short messages, resolving promptly when customer says thanks.
  Do NOT penalize for missing CRM write calls — handled by post_conversation expert.

