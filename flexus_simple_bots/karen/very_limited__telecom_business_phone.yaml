  content: |-
    📄/company/summary
    {
      "stage": "Growth",
      "mission": "Unified business communications that scale with you",
      "tagline": "One platform for every call, message, and meeting",
      "website": "https://ringroute.io",
      "industry": "Telecommunications / UCaaS",
      "company_name": "RingRoute"
    }

    📄/company/sales-strategy
    {
      "approach": "consultative",
      "icp": "Mid-market companies (100-2,000 employees) with multiple offices or remote/hybrid workforces that need reliable unified communications — replacing legacy PBX, fragmented phone systems, or underperforming UCaaS providers",
      "objection_playbook": {
        "price": "Factor in what you're spending on your current PBX maintenance, separate conferencing tools, and helpdesk tickets for phone issues. RingRoute consolidates all of that. Most customers see 30-40% total cost reduction.",
        "contract_lockin": "We offer a contract buyout program — we'll cover early termination fees up to $15K when you switch. Plus, our agreements are annual with 90-day out clauses, so you're never trapped.",
        "migration_downtime": "Migration runs in parallel: we port numbers and configure the new system while your old one stays live. Cutover happens after hours with a rollback plan. Average downtime is under 15 minutes.",
        "competitor": "We respect other providers. Our edge is multi-site reliability (geo-redundant with automatic failover), native integrations with Salesforce/HubSpot/Teams, and a dedicated migration engineer — not a DIY portal."
      },
      "trial": {
        "duration_days": 14,
        "credit_card_required": false,
        "includes": "Full platform access for up to 25 users: voice, video, messaging, integrations. Dedicated onboarding call included. Number porting not included in trial — handled during paid migration."
      }
    }

    📄/support/summary
    {
      "support-policy": {
        "meta": {
          "created_at": "2026-03-15T08:00:00.000000+00:00"
        },
        "section01-product": {
          "title": "Product",
          "question01-description": {
            "a": "RingRoute is a cloud-based unified communications platform (UCaaS) for businesses. We provide business phone service, video conferencing, team messaging, and contact center features in a single platform. Designed for multi-site and hybrid workforces with enterprise-grade reliability.",
            "q": "What is the product?"
          },
          "question02-features": {
            "a": "Cloud PBX with auto-attendant, call routing, and IVR. HD voice and video conferencing (up to 500 participants). Team messaging with file sharing. Call recording and analytics. CRM integrations (Salesforce, HubSpot, Zoho, Microsoft Dynamics). Microsoft Teams direct routing. Mobile and desktop apps. Multi-site management with centralized admin. 99.999% uptime SLA (five nines). Geo-redundant infrastructure across 4 data centers. Number porting from any carrier. Contact center add-on with ACD, skills-based routing, and real-time dashboards.",
            "q": "What are the key features?"
          },
          "question03-ideal-customer-profile": {
            "a": "Companies with 100-2,000 employees, especially those with multiple offices, remote/hybrid workers, or growing teams that need to scale quickly. Common verticals: professional services, healthcare, financial services, tech companies, and franchises.",
            "q": "Who is the ideal customer (ICP)?"
          }
        },
        "section02-future-ops": {
          "title": "Pricing & Billing",
          "question01-shipping": {
            "a": "Desk phones (Poly, Yealink) available for purchase or rental. Ships within 3-5 business days, pre-provisioned and ready to plug in. Headsets and conference room equipment also available.",
            "q": "Shipping methods, costs, times?"
          },
          "question04-payments": {
            "a": "Per-user/month pricing, billed annually or monthly. Essentials: $24/user/month (voice, messaging, basic video). Professional: $34/user/month (adds CRM integrations, call recording, analytics, 200-person video). Enterprise: $48/user/month (adds contact center, custom IVR, dedicated support, 500-person video, SSO/SCIM). Volume discounts: 250+ users get 15% off, 500+ users get custom pricing. All plans include unlimited domestic calling and number porting.",
            "q": "Payment options & pricing?"
          },
          "question02-returns": {
            "a": "14-day free trial, no credit card required. Annual contracts have a 90-day out clause with prorated refund. Rented hardware returned within 30 days of cancellation at no cost.",
            "q": "Refund policy?"
          }
        },
        "section03-support": {
          "title": "Support",
          "question01-channels": {
            "a": "Telegram @ringroute_support, email support@ringroute.io, phone (all plans): +1-855-555-0199, live chat on ringroute.io. Enterprise plans get a dedicated account manager and 24/7 priority support line.",
            "q": "Support channels (email, chat, etc.)?"
          },
          "question02-escalation": {
            "a": "Number porting issues, contract buyout calculations, enterprise/custom pricing, outage reports, security/compliance questions, requests for human agent",
            "q": "When to escalate to human?"
          }
        },
        "section04-restrictions": {
          "title": "Restrictions",
          "question01-never-say": {
            "a": "Never guarantee specific call quality metrics (jitter, latency) without knowing the customer's network. Never make claims about E911 compliance without searching first. Never promise custom pricing without sales team approval. Never disparage specific competitors by name. Never share other customers' configurations or usage data.",
            "q": "What should support NEVER say?"
          }
        }
      }
    }
