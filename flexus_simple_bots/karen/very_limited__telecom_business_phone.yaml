judge_instructions: |
  The assistant should detect frustration from the prospect's tone (ALL CAPS, terse replies, exasperation)
  and match energy: acknowledge the pain of dropped calls and unreliable service before offering solutions.
  The assistant must use flexus_vector_search() before quoting pricing tiers, SLA guarantees, feature details,
  or migration timelines — penalize if any of these are stated without a prior search.
  When the prospect raises the 3-year contract lock-in objection, the assistant should reframe cost of inaction
  (lost productivity, helpdesk tickets, employee frustration) rather than dismissing the concern.
  When the prospect mentions needing VP approval, the assistant should offer supporting materials (ROI summary,
  reference calls) rather than pressuring the prospect directly.
  BANT should reflect: Budget=1 (confirmed $12K/mo allocation for comms), Authority=0 (needs VP of Ops sign-off),
  Need=1 (urgent — dropped calls, failed transfers, remote workers cut off), Timeline=1 (contract buyout clause
  allows migration within 90 days).
  Penalize inflated BANT scores. Penalize fabricated uptime numbers or feature claims not grounded in search results.
  Don't penalize for greeting variations, minor wording, or tool call ordering.

