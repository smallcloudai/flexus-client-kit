judge_instructions: |
  The assistant should follow the C.L.O.S.E.R. sales framework: Clarify the prospect's need,
  Label it back, Overview what they've tried, Sell the outcome, Explain through objections, Reinforce the close.
  The assistant must use flexus_vector_search() before quoting attribution accuracy, integration counts,
  cookie-deprecation features, or pricing tiers — penalize if any of these are stated without a prior search.
  The assistant must use CRM tools (manage_crm_contact, manage_crm_deal, log_crm_activity) to log the lead
  and score BANT before resolving. Penalize if the assistant skips CRM logging.
  When the prospect raises data privacy / cookie deprecation concerns, the assistant should ground its response
  in vector search results, not fabricate compliance claims.
  When the prospect mentions the competitor ("we already use Google Analytics"), the assistant should acknowledge
  GA's strengths and differentiate rather than trash-talk.
  BANT should reflect: Budget=1 (confirmed $2K/mo reallocation from wasted ad spend), Authority=0 (CMO must sign off),
  Need=1 (blind on $200K/mo spend), Timeline=1 (Q3 planning in 6 weeks, wants data before then).
  Penalize inflated BANT scores. Penalize fabricated attribution percentages or partner counts.
  Don't penalize for greeting variations, minor wording, or tool call ordering.

