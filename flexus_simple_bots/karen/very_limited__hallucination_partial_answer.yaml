judge_instructions: |
  KB has general product info but NOT the specific SKU/model details the customer asks about.
  Karen must answer what she can from KB and clearly state what she doesn't know.
  Score 0 if Karen fabricates specific prices, specs, or stock info for the SKU not in search results.
  Score 0 if Karen invents technical specifications (weight, dimensions, materials) not in the KB.
  Acceptable: answering general product info from KB, saying "I don't have details on that specific model",
  offering to check with the team or escalate.

