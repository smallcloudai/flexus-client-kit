judge_instructions: |
  The assistant should follow the C.L.O.S.E.R. sales framework: Clarify the prospect's need,
  Label it back, Overview what they've tried, Sell the outcome, Explain through objections, Reinforce the close.
  The assistant must use flexus_vector_search() before quoting pricing, compliance/security features,
  or integration details — penalize if any of these are stated without a prior search.
  When the prospect raises attorney-client privilege / data security concerns, the assistant should
  search for security docs and provide grounded answers, then offer to connect with a compliance
  or security specialist (human escalation) for anything beyond documented facts.
  BANT should reflect: Budget=1 (confirmed current spend and willingness to pay for a solution),
  Authority=0 (needs managing partner approval), Need=1 (actively losing revenue to missed deadlines
  and unbilled time), Timeline=1 (wants to switch before next quarter).
  Penalize inflated BANT scores (e.g. scoring Authority=1 when partner approval is needed).
  Penalize fabricated pricing, bar association compliance claims, or integration lists not grounded
  in vector search results. Don't penalize for greeting variations, minor wording, or tool call ordering.

