<!-- Scout Email Component: incentive_box -->
<!-- Params: title, description -->
<!-- Only rendered if has content -->
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="padding: 10px 20px;">
  <tr>
    <td>
      <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #FEF3C7; border-left: 4px solid #F59E0B; border-radius: 4px; padding: 16px;">
        <tr>
          <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
            <div style="font-size: 14px; font-weight: 600; color: #92400E; margin-bottom: 4px;">{{title}}</div>
            <div style="font-size: 14px; color: #78350F;">{{description}}</div>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
