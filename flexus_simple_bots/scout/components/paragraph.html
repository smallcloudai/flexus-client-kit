<!-- Scout Email Component: paragraph -->
<!-- Params: align (left|center|right, default left) -->
<!-- Content: The paragraph text -->
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="padding: 10px 20px;">
  <tr>
    <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 16px; line-height: 1.6; color: #333333; text-align: {{align|default:left}};">
      {{content}}
    </td>
  </tr>
</table>
