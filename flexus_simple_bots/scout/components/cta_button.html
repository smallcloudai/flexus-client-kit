<!-- Scout Email Component: cta_button -->
<!-- Params: text, url, color (optional, default #22C55E) -->
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="padding: 20px;">
  <tr>
    <td align="center">
      <a href="{{url}}" style="display: inline-block; background-color: {{color|default:#22C55E}}; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 16px; font-weight: 600; text-decoration: none; padding: 14px 32px; border-radius: 6px;">
        {{text}}
      </a>
    </td>
  </tr>
</table>
