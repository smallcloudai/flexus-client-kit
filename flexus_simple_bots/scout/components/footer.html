<!-- Scout Email Component: footer -->
<!-- Params: company (optional), address (optional) -->
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #F9FAFB; padding: 20px; margin-top: 20px;">
  <tr>
    <td align="center" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; color: #9CA3AF;">
      {{#if company}}
      <div style="margin-bottom: 8px;">{{company}}</div>
      {{/if}}
      {{#if address}}
      <div style="margin-bottom: 8px;">{{address}}</div>
      {{/if}}
      <div>
        You received this email because you signed up. 
        <a href="{{unsubscribe_url}}" style="color: #6B7280; text-decoration: underline;">Unsubscribe</a>
      </div>
    </td>
  </tr>
</table>
