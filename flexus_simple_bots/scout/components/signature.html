<!-- Scout Email Component: signature -->
<!-- Params: name, title (optional), photo_url (optional) -->
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="padding: 30px 20px 20px 20px;">
  <tr>
    <td style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; color: #666666;">
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          {{#if photo_url}}
          <td style="padding-right: 12px; vertical-align: top;">
            <img src="{{photo_url}}" alt="{{name}}" style="width: 48px; height: 48px; border-radius: 50%;">
          </td>
          {{/if}}
          <td style="vertical-align: top;">
            <div style="font-weight: 600; color: #333333;">{{name}}</div>
            {{#if title}}
            <div style="color: #666666;">{{title}}</div>
            {{/if}}
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
