<!-- Scout Email Component: header -->
<!-- Params: brand_color (optional, default #4A90D9), logo_url (optional) -->
<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: {{brand_color|default:#4A90D9}}; padding: 20px 0;">
  <tr>
    <td align="center">
      {{#if logo_url}}
      <img src="{{logo_url}}" alt="Logo" style="max-height: 40px; max-width: 200px;">
      {{/if}}
    </td>
  </tr>
</table>
